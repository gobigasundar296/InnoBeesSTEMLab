<text x="625.0" y="194" class="h2" text-anchor="middle">KY-026 Flame Sensor</text>
<rect x="672" y="214" width="120" height="76" rx="10" fill="#ffd7bd" stroke="#17324d" stroke-width="3"/>
<path d="M732,282 C698,256 730,244 722,207 C766,240 760,264 732,282 Z" fill="#ef7d19" stroke="#e53935" stroke-width="3"/>
<circle cx="440" cy="226.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
