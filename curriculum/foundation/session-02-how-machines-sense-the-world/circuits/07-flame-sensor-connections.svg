<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Some modules output LOW on flame</text>
<text x="870" y="587" class="small" text-anchor="start">Test module logic before alarms</text>
<text x="870" y="612" class="small" text-anchor="start">Teacher-supervised testing only</text>
  <text x="48" y="694" class="small">Use safe IR sources or supervised flame tests only.</text>
