<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Smart Street Light Complete Circuit</title>
  <desc id="desc">The Arduino reads the LDR divider on A0 and turns the LED on when the room is dark.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">Smart Street Light Complete Circuit</text>
<rect x="50" y="105" width="245" height="500" rx="24" fill="#cce9f0" stroke="#167187" stroke-width="3"/>
<text x="172.5" y="143" class="h2" text-anchor="middle">Arduino Uno</text>
<rect x="78" y="177" width="78" height="120" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="117" y="229" class="tiny" text-anchor="middle">ATmega</text>
<text x="117" y="249" class="tiny" text-anchor="middle">328P</text>
<rect x="83" y="517" width="95" height="52" rx="8" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="130" y="549" class="tiny" text-anchor="middle">USB-B</text>
<circle cx="290" cy="183.0" r="8" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="213" y="188.0" class="small" text-anchor="start">A0</text>
<circle cx="290" cy="306.3333333333333" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="213" y="311.3333333333333" class="small" text-anchor="start">D8</text>
<circle cx="290" cy="429.66666666666663" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="213" y="434.66666666666663" class="small" text-anchor="start">5V</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="420" y="150" width="300" height="235" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="570.0" y="184" class="h2" text-anchor="middle">Light Sensor Divider</text>
<circle cx="642" cy="242" r="42" fill="#f3e6a1" stroke="#17324d" stroke-width="3"/>
<polyline points="586,204 619,227" class="wire" stroke="#f6a800" stroke-width="4" marker-end="url(#arrow)"/>
<polyline points="588,247 620,264" class="wire" stroke="#f6a800" stroke-width="4" marker-end="url(#arrow)"/>
<text x="642" y="248" class="label" text-anchor="middle">LDR</text>
<circle cx="420" cy="216.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="438" y="221.0" class="small" text-anchor="start">5V</text>
<circle cx="420" cy="285.5" r="7" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="438" y="290.5" class="small" text-anchor="start">A0</text>
<circle cx="420" cy="355.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="438" y="360.0" class="small" text-anchor="start">GND</text>
<rect x="760" y="170" width="310" height="215" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="915.0" y="204" class="h2" text-anchor="middle">Street Light LED</text>

  <path d="M966,264 Q992,218 1018,264 Z" fill="#f6a800" stroke="#17324d" stroke-width="3"/>
  <line x1="966" y1="264" x2="966" y2="320" stroke="#17324d" stroke-width="4"/>
  <line x1="1018" y1="264" x2="1018" y2="320" stroke="#17324d" stroke-width="4"/>
  <text x="992" y="211" class="tiny" text-anchor="middle"></text>


  <line x1="810" y1="343" x2="852" y2="343" stroke="#17324d" stroke-width="4"/>
  <rect x="852" y="327" width="112" height="32" rx="8" fill="#f2dda1" stroke="#795f22" stroke-width="3"/>
  <line x1="964" y1="343" x2="1006" y2="343" stroke="#17324d" stroke-width="4"/>
  <text x="908" y="318" class="tiny" text-anchor="middle">330 ohm</text>

<circle cx="760" cy="236.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="778" y="241.0" class="small" text-anchor="start">D8</text>
<circle cx="760" cy="355.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="778" y="360.0" class="small" text-anchor="start">GND</text>
<polyline points="290,429.66666666666663 355.0,408.66666666666663 355.0,195.0 420,216.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="363.0" y="296.8333333333333" class="tiny" text-anchor="start">divider power</text>
<polyline points="290,183.0 355.0,169.0 355.0,271.5 420,285.5" class="wire" stroke="#2e9d55" stroke-width="5"/>
<text x="363.0" y="215.25" class="tiny" text-anchor="start">light reading</text>
<polyline points="290,553.0 355.0,546.0 355.0,348.0 420,355.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="363.0" y="442.0" class="tiny" text-anchor="start">return</text>
<polyline points="290,306.3333333333333 525.0,306.3333333333333 525.0,236.0 760,236.0" class="wire" stroke="#ef7d19" stroke-width="5"/>
<text x="533.0" y="266.16666666666663" class="tiny" text-anchor="start">dark = HIGH</text>
<polyline points="290,553.0 525.0,560.0 525.0,362.0 760,355.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="533.0" y="456.0" class="tiny" text-anchor="start">return</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Threshold in code: 300</text>
<text x="870" y="587" class="small" text-anchor="start">Cover LDR to simulate night</text>
<text x="870" y="612" class="small" text-anchor="start">Use Serial Monitor to calibrate</text>
  <text x="48" y="694" class="small">Pins match arduino/03_ldr_street_light.</text>
</svg>
