<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Push Button with INPUT_PULLUP</title>
  <desc id="desc">The internal Arduino pull-up holds D2 HIGH until the button connects the pin to GND.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">Push Button with INPUT_PULLUP</text>
<rect x="50" y="105" width="245" height="500" rx="24" fill="#cce9f0" stroke="#167187" stroke-width="3"/>
<text x="172.5" y="143" class="h2" text-anchor="middle">Arduino Uno</text>
<rect x="78" y="177" width="78" height="120" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="117" y="229" class="tiny" text-anchor="middle">ATmega</text>
<text x="117" y="249" class="tiny" text-anchor="middle">328P</text>
<rect x="83" y="517" width="95" height="52" rx="8" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="130" y="549" class="tiny" text-anchor="middle">USB-B</text>
<circle cx="290" cy="183.0" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="213" y="188.0" class="small" text-anchor="start">D2</text>
<circle cx="290" cy="368.0" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="213" y="373.0" class="small" text-anchor="start">D8</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="430" y="170" width="275" height="205" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="567.5" y="204" class="h2" text-anchor="middle">Push Button</text>
<rect x="577" y="244" width="100" height="48" rx="8" fill="#dce7eb" stroke="#17324d" stroke-width="3"/>
<rect x="599" y="210" width="56" height="28" rx="8" fill="#f5f5f5" stroke="#17324d" stroke-width="3"/>
<polyline points="627,238 627,260" class="wire" stroke="#17324d" stroke-width="7"/>
<circle cx="430" cy="236.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="448" y="241.0" class="small" text-anchor="start">D2</text>
<circle cx="430" cy="345.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="448" y="350.0" class="small" text-anchor="start">GND</text>
<rect x="735" y="170" width="300" height="205" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="885.0" y="204" class="h2" text-anchor="middle">Indicator LED</text>

  <path d="M931,264 Q957,218 983,264 Z" fill="#e53935" stroke="#17324d" stroke-width="3"/>
  <line x1="931" y1="264" x2="931" y2="320" stroke="#17324d" stroke-width="4"/>
  <line x1="983" y1="264" x2="983" y2="320" stroke="#17324d" stroke-width="4"/>
  <text x="957" y="211" class="tiny" text-anchor="middle"></text>


  <line x1="785" y1="333" x2="827" y2="333" stroke="#17324d" stroke-width="4"/>
  <rect x="827" y="317" width="112" height="32" rx="8" fill="#f2dda1" stroke="#795f22" stroke-width="3"/>
  <line x1="939" y1="333" x2="981" y2="333" stroke="#17324d" stroke-width="4"/>
  <text x="883" y="308" class="tiny" text-anchor="middle">330 ohm</text>

<circle cx="735" cy="236.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="753" y="241.0" class="small" text-anchor="start">D8</text>
<circle cx="735" cy="345.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="753" y="350.0" class="small" text-anchor="start">GND</text>
<polyline points="290,183.0 360.0,162.0 360.0,215.0 430,236.0" class="wire" stroke="#2374d8" stroke-width="5"/>
<text x="368.0" y="183.5" class="tiny" text-anchor="start">pressed = LOW</text>
<polyline points="290,553.0 360.0,539.0 360.0,331.0 430,345.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="368.0" y="430.0" class="tiny" text-anchor="start">return</text>
<polyline points="290,368.0 512.5,361.0 512.5,229.0 735,236.0" class="wire" stroke="#ef7d19" stroke-width="5"/>
<text x="520.5" y="290.0" class="tiny" text-anchor="start">LED output</text>
<polyline points="290,553.0 512.5,553.0 512.5,345.0 735,345.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="520.5" y="444.0" class="tiny" text-anchor="start">return</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Use pinMode(D2, INPUT_PULLUP)</text>
<text x="870" y="587" class="small" text-anchor="start">Logic is inverted</text>
<text x="870" y="612" class="small" text-anchor="start">LOW means pressed</text>
  <text x="48" y="694" class="small">This is the wiring used by arduino/01_button_led_control.</text>
</svg>
