<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LDR Voltage Divider Circuit</title>
  <desc id="desc">An LDR and 10k resistor convert changing light into a changing voltage on A0.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">LDR Voltage Divider Circuit</text>
<rect x="50" y="105" width="245" height="500" rx="24" fill="#cce9f0" stroke="#167187" stroke-width="3"/>
<text x="172.5" y="143" class="h2" text-anchor="middle">Arduino Uno</text>
<rect x="78" y="177" width="78" height="120" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="117" y="229" class="tiny" text-anchor="middle">ATmega</text>
<text x="117" y="249" class="tiny" text-anchor="middle">328P</text>
<rect x="83" y="517" width="95" height="52" rx="8" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="130" y="549" class="tiny" text-anchor="middle">USB-B</text>
<circle cx="290" cy="183.0" r="8" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="213" y="188.0" class="small" text-anchor="start">A0</text>
<circle cx="290" cy="368.0" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="213" y="373.0" class="small" text-anchor="start">5V</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="445" y="180" width="340" height="250" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="615.0" y="214" class="h2" text-anchor="middle">LDR + 10k Divider</text>
<circle cx="707" cy="272" r="42" fill="#f3e6a1" stroke="#17324d" stroke-width="3"/>
<polyline points="651,234 684,257" class="wire" stroke="#f6a800" stroke-width="4" marker-end="url(#arrow)"/>
<polyline points="653,277 685,294" class="wire" stroke="#f6a800" stroke-width="4" marker-end="url(#arrow)"/>
<text x="707" y="278" class="label" text-anchor="middle">LDR</text>
<circle cx="445" cy="246.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="463" y="251.0" class="small" text-anchor="start">5V</text>
<circle cx="445" cy="323.0" r="7" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="463" y="328.0" class="small" text-anchor="start">A0</text>
<circle cx="445" cy="400.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="463" y="405.0" class="small" text-anchor="start">GND</text>
<polyline points="290,368.0 367.5,347.0 367.5,225.0 445,246.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="375.5" y="281.0" class="tiny" text-anchor="start">top of divider</text>
<polyline points="290,183.0 367.5,169.0 367.5,309.0 445,323.0" class="wire" stroke="#2e9d55" stroke-width="5"/>
<text x="375.5" y="234.0" class="tiny" text-anchor="start">analog voltage</text>
<polyline points="290,553.0 367.5,546.0 367.5,393.0 445,400.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="375.5" y="464.5" class="tiny" text-anchor="start">10k to GND</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Bright light: higher A0 reading</text>
<text x="870" y="587" class="small" text-anchor="start">Darkness: lower A0 reading</text>
<text x="870" y="612" class="small" text-anchor="start">Choose threshold after testing</text>
  <text x="48" y="694" class="small">Circuit from Chapter 3 and Smart Street Light program.</text>
</svg>
