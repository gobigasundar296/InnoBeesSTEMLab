<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Push Button with Pull-Down Resistor</title>
  <desc id="desc">A push button connects D2 to 5V when pressed, while a 10k resistor holds D2 LOW when released.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">Push Button with Pull-Down Resistor</text>
<rect x="50" y="105" width="245" height="500" rx="24" fill="#cce9f0" stroke="#167187" stroke-width="3"/>
<text x="172.5" y="143" class="h2" text-anchor="middle">Arduino Uno</text>
<rect x="78" y="177" width="78" height="120" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="117" y="229" class="tiny" text-anchor="middle">ATmega</text>
<text x="117" y="249" class="tiny" text-anchor="middle">328P</text>
<rect x="83" y="517" width="95" height="52" rx="8" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="130" y="549" class="tiny" text-anchor="middle">USB-B</text>
<circle cx="290" cy="183.0" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="213" y="188.0" class="small" text-anchor="start">D2</text>
<circle cx="290" cy="368.0" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="213" y="373.0" class="small" text-anchor="start">5V</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="445" y="185" width="330" height="245" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="610.0" y="219" class="h2" text-anchor="middle">Button + 10k Pull-down</text>
<rect x="647" y="259" width="100" height="48" rx="8" fill="#dce7eb" stroke="#17324d" stroke-width="3"/>
<rect x="669" y="225" width="56" height="28" rx="8" fill="#f5f5f5" stroke="#17324d" stroke-width="3"/>
<polyline points="697,253 697,275" class="wire" stroke="#17324d" stroke-width="7"/>
<circle cx="445" cy="251.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="463" y="256.0" class="small" text-anchor="start">5V</text>
<circle cx="445" cy="325.5" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="463" y="330.5" class="small" text-anchor="start">D2</text>
<circle cx="445" cy="400.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="463" y="405.0" class="small" text-anchor="start">GND</text>
<polyline points="290,368.0 367.5,347.0 367.5,230.0 445,251.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="375.5" y="283.5" class="tiny" text-anchor="start">press path</text>
<polyline points="290,183.0 367.5,169.0 367.5,311.5 445,325.5" class="wire" stroke="#2374d8" stroke-width="5"/>
<text x="375.5" y="235.25" class="tiny" text-anchor="start">digital input</text>
<polyline points="290,553.0 367.5,546.0 367.5,393.0 445,400.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="375.5" y="464.5" class="tiny" text-anchor="start">10k to GND</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Released: D2 reads LOW</text>
<text x="870" y="587" class="small" text-anchor="start">Pressed: D2 reads HIGH</text>
<text x="870" y="612" class="small" text-anchor="start">Use 10k ohm for the pull-down</text>
  <text x="48" y="694" class="small">Pull resistors stop input pins from floating.</text>
</svg>
