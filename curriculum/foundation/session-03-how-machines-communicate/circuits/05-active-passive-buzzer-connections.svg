<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Active and Passive Buzzer Connections</title>
  <desc id="desc">Active buzzers make a fixed tone from HIGH/LOW; passive buzzers need tone() frequencies.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">Active and Passive Buzzer Connections</text>
<rect x="50" y="105" width="245" height="500" rx="24" fill="#cce9f0" stroke="#167187" stroke-width="3"/>
<text x="172.5" y="143" class="h2" text-anchor="middle">Arduino Uno</text>
<rect x="78" y="177" width="78" height="120" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="117" y="229" class="tiny" text-anchor="middle">ATmega</text>
<text x="117" y="249" class="tiny" text-anchor="middle">328P</text>
<rect x="83" y="517" width="95" height="52" rx="8" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="130" y="549" class="tiny" text-anchor="middle">USB-B</text>
<circle cx="290" cy="183.0" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="213" y="188.0" class="small" text-anchor="start">D7</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="405" y="155" width="300" height="230" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="555.0" y="189" class="h2" text-anchor="middle">Active Buzzer</text>
<circle cx="627" cy="247" r="42" fill="#dcd5fa" stroke="#4d3aa3" stroke-width="4"/>
<circle cx="627" cy="247" r="16" fill="#4d3aa3"/>
<polyline points="669,227 692,212" class="wire" stroke="#7556d8" stroke-width="3"/>
<polyline points="675,247 702,247" class="wire" stroke="#7556d8" stroke-width="3"/>
<circle cx="405" cy="221.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="423" y="226.0" class="small" text-anchor="start">D7</text>
<circle cx="405" cy="355.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="423" y="360.0" class="small" text-anchor="start">GND</text>
<rect x="735" y="155" width="300" height="230" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="885.0" y="189" class="h2" text-anchor="middle">Passive Buzzer</text>
<circle cx="957" cy="247" r="42" fill="#dcd5fa" stroke="#4d3aa3" stroke-width="4"/>
<circle cx="957" cy="247" r="16" fill="#4d3aa3"/>
<polyline points="999,227 1022,212" class="wire" stroke="#7556d8" stroke-width="3"/>
<polyline points="1005,247 1032,247" class="wire" stroke="#7556d8" stroke-width="3"/>
<circle cx="735" cy="221.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="753" y="226.0" class="small" text-anchor="start">D7</text>
<circle cx="735" cy="355.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="753" y="360.0" class="small" text-anchor="start">GND</text>
<polyline points="290,183.0 347.5,162.0 347.5,200.0 405,221.0" class="wire" stroke="#7556d8" stroke-width="5"/>
<text x="355.5" y="176.0" class="tiny" text-anchor="start">digitalWrite</text>
<polyline points="290,553.0 347.5,539.0 347.5,341.0 405,355.0" class="wire" stroke="#263238" stroke-width="5"/>
<polyline points="290,183.0 512.5,176.0 512.5,214.0 735,221.0" class="wire" stroke="#2374d8" stroke-width="5"/>
<text x="520.5" y="190.0" class="tiny" text-anchor="start">tone()</text>
<polyline points="290,553.0 512.5,553.0 512.5,355.0 735,355.0" class="wire" stroke="#263238" stroke-width="5"/>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Use one buzzer at a time</text>
<text x="870" y="587" class="small" text-anchor="start">Active: HIGH sounds</text>
<text x="870" y="612" class="small" text-anchor="start">Passive: tone(pin, frequency)</text>
  <text x="48" y="694" class="small">Program 5 uses a passive buzzer on D7.</text>
</svg>
