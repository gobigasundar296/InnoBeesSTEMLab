<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LCD I2C Backpack Wiring</title>
  <desc id="desc">An I2C backpack reduces the 16x2 LCD connection to power, ground, SDA, and SCL.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">LCD I2C Backpack Wiring</text>
<rect x="50" y="105" width="245" height="500" rx="24" fill="#cce9f0" stroke="#167187" stroke-width="3"/>
<text x="172.5" y="143" class="h2" text-anchor="middle">Arduino Uno</text>
<rect x="78" y="177" width="78" height="120" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="117" y="229" class="tiny" text-anchor="middle">ATmega</text>
<text x="117" y="249" class="tiny" text-anchor="middle">328P</text>
<rect x="83" y="517" width="95" height="52" rx="8" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="130" y="549" class="tiny" text-anchor="middle">USB-B</text>
<circle cx="290" cy="183.0" r="8" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="213" y="188.0" class="small" text-anchor="start">A4/SDA</text>
<circle cx="290" cy="306.3333333333333" r="8" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="213" y="311.3333333333333" class="small" text-anchor="start">A5/SCL</text>
<circle cx="290" cy="429.66666666666663" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="213" y="434.66666666666663" class="small" text-anchor="start">5V</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="430" y="160" width="380" height="285" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="620.0" y="194" class="h2" text-anchor="middle">16x2 LCD + I2C</text>
<rect x="658" y="210" width="148" height="84" rx="8" fill="#1d6b82" stroke="#17324d" stroke-width="3"/>
<rect x="674" y="230" width="116" height="42" rx="3" fill="#cfe7c7" stroke="#285a32" stroke-width="3"/>
<text x="732" y="257" class="tiny" text-anchor="middle">16 x 2</text>
<circle cx="430" cy="226.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="448" y="231.0" class="small" text-anchor="start">SDA</text>
<circle cx="430" cy="289.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="448" y="294.0" class="small" text-anchor="start">SCL</text>
<circle cx="430" cy="352.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="448" y="357.0" class="small" text-anchor="start">VCC</text>
<circle cx="430" cy="415.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="448" y="420.0" class="small" text-anchor="start">GND</text>
<polyline points="290,183.0 360.0,162.0 360.0,205.0 430,226.0" class="wire" stroke="#2374d8" stroke-width="5"/>
<text x="368.0" y="178.5" class="tiny" text-anchor="start">data</text>
<polyline points="290,306.3333333333333 360.0,292.3333333333333 360.0,275.0 430,289.0" class="wire" stroke="#7556d8" stroke-width="5"/>
<text x="368.0" y="278.66666666666663" class="tiny" text-anchor="start">clock</text>
<polyline points="290,429.66666666666663 360.0,422.66666666666663 360.0,345.0 430,352.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="368.0" y="378.8333333333333" class="tiny" text-anchor="start">power</text>
<polyline points="290,553.0 360.0,553.0 360.0,415.0 430,415.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="368.0" y="479.0" class="tiny" text-anchor="start">return</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Common address: 0x27</text>
<text x="870" y="587" class="small" text-anchor="start">Try 0x3F if blank</text>
<text x="870" y="612" class="small" text-anchor="start">Adjust contrast on backpack trimmer</text>
  <text x="48" y="694" class="small">Pins match arduino/02_lcd_welcome_display.</text>
</svg>
