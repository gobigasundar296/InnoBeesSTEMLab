<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Welcome Display with Sensor</title>
  <desc id="desc">A 16x2 I2C LCD displays messages while the Arduino can also read an LDR sensor on A0.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">Welcome Display with Sensor</text>
<rect x="50" y="105" width="245" height="500" rx="24" fill="#cce9f0" stroke="#167187" stroke-width="3"/>
<text x="172.5" y="143" class="h2" text-anchor="middle">Arduino Uno</text>
<rect x="78" y="177" width="78" height="120" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="117" y="229" class="tiny" text-anchor="middle">ATmega</text>
<text x="117" y="249" class="tiny" text-anchor="middle">328P</text>
<rect x="83" y="517" width="95" height="52" rx="8" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="130" y="549" class="tiny" text-anchor="middle">USB-B</text>
<circle cx="290" cy="183.0" r="8" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="213" y="188.0" class="small" text-anchor="start">A0</text>
<circle cx="290" cy="275.5" r="8" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="213" y="280.5" class="small" text-anchor="start">A4/SDA</text>
<circle cx="290" cy="368.0" r="8" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="213" y="373.0" class="small" text-anchor="start">A5/SCL</text>
<circle cx="290" cy="460.5" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="213" y="465.5" class="small" text-anchor="start">5V</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="410" y="130" width="330" height="260" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="575.0" y="164" class="h2" text-anchor="middle">I2C LCD</text>
<rect x="588" y="180" width="148" height="84" rx="8" fill="#1d6b82" stroke="#17324d" stroke-width="3"/>
<rect x="604" y="200" width="116" height="42" rx="3" fill="#cfe7c7" stroke="#285a32" stroke-width="3"/>
<text x="662" y="227" class="tiny" text-anchor="middle">16 x 2</text>
<circle cx="410" cy="196.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="428" y="201.0" class="small" text-anchor="start">SDA</text>
<circle cx="410" cy="250.66666666666666" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="428" y="255.66666666666666" class="small" text-anchor="start">SCL</text>
<circle cx="410" cy="305.3333333333333" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="428" y="310.3333333333333" class="small" text-anchor="start">VCC</text>
<circle cx="410" cy="360.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="428" y="365.0" class="small" text-anchor="start">GND</text>
<rect x="770" y="225" width="310" height="235" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="925.0" y="259" class="h2" text-anchor="middle">LDR Divider</text>
<circle cx="1002" cy="317" r="42" fill="#f3e6a1" stroke="#17324d" stroke-width="3"/>
<polyline points="946,279 979,302" class="wire" stroke="#f6a800" stroke-width="4" marker-end="url(#arrow)"/>
<polyline points="948,322 980,339" class="wire" stroke="#f6a800" stroke-width="4" marker-end="url(#arrow)"/>
<text x="1002" y="323" class="label" text-anchor="middle">LDR</text>
<circle cx="770" cy="291.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="788" y="296.0" class="small" text-anchor="start">5V</text>
<circle cx="770" cy="360.5" r="7" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="788" y="365.5" class="small" text-anchor="start">A0</text>
<circle cx="770" cy="430.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="788" y="435.0" class="small" text-anchor="start">GND</text>
<polyline points="290,275.5 350.0,254.5 350.0,175.0 410,196.0" class="wire" stroke="#2374d8" stroke-width="5"/>
<text x="358.0" y="209.75" class="tiny" text-anchor="start">data</text>
<polyline points="290,368.0 350.0,354.0 350.0,236.66666666666666 410,250.66666666666666" class="wire" stroke="#7556d8" stroke-width="5"/>
<text x="358.0" y="290.3333333333333" class="tiny" text-anchor="start">clock</text>
<polyline points="290,460.5 350.0,453.5 350.0,298.3333333333333 410,305.3333333333333" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="358.0" y="370.91666666666663" class="tiny" text-anchor="start">power</text>
<polyline points="290,553.0 350.0,553.0 350.0,360.0 410,360.0" class="wire" stroke="#263238" stroke-width="5"/>
<polyline points="290,460.5 530.0,467.5 530.0,298.0 770,291.0" class="wire" stroke="#e53935" stroke-width="5"/>
<polyline points="290,183.0 530.0,197.0 530.0,374.5 770,360.5" class="wire" stroke="#2e9d55" stroke-width="5"/>
<text x="538.0" y="280.75" class="tiny" text-anchor="start">sensor data</text>
<polyline points="290,553.0 530.0,574.0 530.0,451.0 770,430.0" class="wire" stroke="#263238" stroke-width="5"/>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Display text on row 0 and row 1</text>
<text x="870" y="587" class="small" text-anchor="start">Optional: show live sensor readings</text>
<text x="870" y="612" class="small" text-anchor="start">I2C saves many pins</text>
  <text x="48" y="694" class="small">This supports the Welcome Display classroom challenge.</text>
</svg>
