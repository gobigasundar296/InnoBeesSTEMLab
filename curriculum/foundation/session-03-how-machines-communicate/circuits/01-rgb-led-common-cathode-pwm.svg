<polyline points="290,553.0 365.0,553.0 365.0,415.0 440,415.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="373.0" y="479.0" class="tiny" text-anchor="start">common cathode</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">One resistor per color channel</text>
<text x="870" y="587" class="small" text-anchor="start">analogWrite values: 0-255</text>
<text x="870" y="612" class="small" text-anchor="start">R+G+B mix visible colors</text>
  <text x="48" y="694" class="small">Pins match arduino/01_rgb_color_mixer.</text>
</svg>
