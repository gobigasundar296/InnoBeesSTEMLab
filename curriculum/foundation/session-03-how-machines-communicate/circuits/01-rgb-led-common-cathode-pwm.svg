<text x="458" y="420.0" class="small" text-anchor="start">GND</text>
<polyline points="290,183.0 365.0,162.0 365.0,205.0 440,226.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="373.0" y="178.5" class="tiny" text-anchor="start">red PWM</text>
<polyline points="290,306.3333333333333 365.0,292.3333333333333 365.0,275.0 440,289.0" class="wire" stroke="#2e9d55" stroke-width="5"/>
<text x="373.0" y="278.66666666666663" class="tiny" text-anchor="start">green PWM</text>
<polyline points="290,429.66666666666663 365.0,422.66666666666663 365.0,345.0 440,352.0" class="wire" stroke="#2374d8" stroke-width="5"/>
