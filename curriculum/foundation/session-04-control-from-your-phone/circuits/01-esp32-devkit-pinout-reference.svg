<circle cx="300" cy="196" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="110" y="201" class="label" text-anchor="start">GND</text>
<polyline points="292,196 220,196" class="wire" stroke="#263238" stroke-width="5"/>
