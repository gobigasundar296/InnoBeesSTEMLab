<polyline points="908,420 980,420" class="wire" stroke="#2374d8" stroke-width="5"/>
<circle cx="900" cy="476" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="930" y="481" class="label" text-anchor="start">GPIO21 SDA</text>
<polyline points="908,476 980,476" class="wire" stroke="#00a6c8" stroke-width="5"/>
<circle cx="900" cy="532" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="930" y="537" class="label" text-anchor="start">GPIO22 SCL</text>
<polyline points="908,532 980,532" class="wire" stroke="#00a6c8" stroke-width="5"/>
<rect x="80" y="520" width="330" height="130" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="98" y="550" class="h2" text-anchor="start">Classroom cautions</text>
<text x="100" y="582" class="small" text-anchor="start">GPIO34 is input-only ADC</text>
<text x="100" y="607" class="small" text-anchor="start">ESP32 GPIO logic is 3.3V</text>
<text x="100" y="632" class="small" text-anchor="start">Use VIN/5V only for board power</text>
<text x="100" y="657" class="small" text-anchor="start">Always share GND</text>
  <text x="48" y="694" class="small">Board labels vary by manufacturer; confirm before wiring.</text>
</svg>
