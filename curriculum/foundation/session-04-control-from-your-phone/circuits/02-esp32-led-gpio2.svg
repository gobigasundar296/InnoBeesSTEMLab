<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ESP32 LED Connection on GPIO 2</title>
  <desc id="desc">GPIO 2 controls the built-in LED on many ESP32 DevKit boards or an external LED through a resistor.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">ESP32 LED Connection on GPIO 2</text>
<rect x="50" y="105" width="230" height="500" rx="24" fill="#d8e7f7" stroke="#167187" stroke-width="3"/>
<text x="165.0" y="143" class="h2" text-anchor="middle">ESP32 DevKit</text>
<rect x="120" y="173" width="90" height="125" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="165" y="233" class="label" text-anchor="middle">ESP32</text>
<rect x="118" y="547" width="94" height="32" rx="6" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="165" y="569" class="tiny" text-anchor="middle">USB</text>
<circle cx="275" cy="183.0" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="198" y="188.0" class="small" text-anchor="start">GPIO2</text>
<circle cx="275" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="198" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="455" y="175" width="340" height="235" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="625.0" y="209" class="h2" text-anchor="middle">LED on GPIO 2</text>

  <path d="M691,269 Q717,223 743,269 Z" fill="#2374d8" stroke="#17324d" stroke-width="3"/>
  <line x1="691" y1="269" x2="691" y2="325" stroke="#17324d" stroke-width="4"/>
  <line x1="743" y1="269" x2="743" y2="325" stroke="#17324d" stroke-width="4"/>
  <text x="717" y="216" class="tiny" text-anchor="middle"></text>


  <line x1="505" y1="368" x2="547" y2="368" stroke="#17324d" stroke-width="4"/>
  <rect x="547" y="352" width="112" height="32" rx="8" fill="#f2dda1" stroke="#795f22" stroke-width="3"/>
  <line x1="659" y1="368" x2="701" y2="368" stroke="#17324d" stroke-width="4"/>
  <text x="603" y="343" class="tiny" text-anchor="middle">330 ohm</text>

<circle cx="455" cy="241.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="473" y="246.0" class="small" text-anchor="start">GPIO2</text>
<circle cx="455" cy="380.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="473" y="385.0" class="small" text-anchor="start">GND</text>
<polyline points="275,183.0 365.0,162.0 365.0,220.0 455,241.0" class="wire" stroke="#ef7d19" stroke-width="5"/>
<text x="373.0" y="186.0" class="tiny" text-anchor="start">command output</text>
<polyline points="275,553.0 365.0,539.0 365.0,366.0 455,380.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="373.0" y="447.5" class="tiny" text-anchor="start">return</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Commands: 1 = ON, 0 = OFF</text>
<text x="870" y="587" class="small" text-anchor="start">GPIO logic is 3.3V</text>
<text x="870" y="612" class="small" text-anchor="start">Some boards already have this LED</text>
  <text x="48" y="694" class="small">Pins match Bluetooth and Wi-Fi LED programs.</text>
</svg>
