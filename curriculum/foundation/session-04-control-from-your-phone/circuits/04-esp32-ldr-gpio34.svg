<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ESP32 with LDR Voltage Divider on GPIO 34</title>
  <desc id="desc">GPIO 34 is an input-only ADC pin suitable for reading the LDR divider while Wi-Fi is active.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">ESP32 with LDR Voltage Divider on GPIO 34</text>
<rect x="50" y="105" width="230" height="500" rx="24" fill="#d8e7f7" stroke="#167187" stroke-width="3"/>
<text x="165.0" y="143" class="h2" text-anchor="middle">ESP32 DevKit</text>
<rect x="120" y="173" width="90" height="125" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="165" y="233" class="label" text-anchor="middle">ESP32</text>
<rect x="118" y="547" width="94" height="32" rx="6" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="165" y="569" class="tiny" text-anchor="middle">USB</text>
<circle cx="275" cy="183.0" r="8" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="198" y="188.0" class="small" text-anchor="start">GPIO34</text>
<circle cx="275" cy="368.0" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="198" y="373.0" class="small" text-anchor="start">3V3</text>
<circle cx="275" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="198" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="445" y="175" width="360" height="250" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="625.0" y="209" class="h2" text-anchor="middle">3.3V LDR Divider</text>
<circle cx="727" cy="267" r="42" fill="#f3e6a1" stroke="#17324d" stroke-width="3"/>
<polyline points="671,229 704,252" class="wire" stroke="#f6a800" stroke-width="4" marker-end="url(#arrow)"/>
<polyline points="673,272 705,289" class="wire" stroke="#f6a800" stroke-width="4" marker-end="url(#arrow)"/>
<text x="727" y="273" class="label" text-anchor="middle">LDR</text>
<circle cx="445" cy="241.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="463" y="246.0" class="small" text-anchor="start">3V3</text>
<circle cx="445" cy="318.0" r="7" fill="#d7f3dd" stroke="#17324d" stroke-width="2"/>
<text x="463" y="323.0" class="small" text-anchor="start">GPIO34</text>
<circle cx="445" cy="395.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="463" y="400.0" class="small" text-anchor="start">GND</text>
<polyline points="275,368.0 360.0,347.0 360.0,220.0 445,241.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="368.0" y="278.5" class="tiny" text-anchor="start">divider power</text>
<polyline points="275,183.0 360.0,169.0 360.0,304.0 445,318.0" class="wire" stroke="#2e9d55" stroke-width="5"/>
<text x="368.0" y="231.5" class="tiny" text-anchor="start">ADC reading</text>
<polyline points="275,553.0 360.0,546.0 360.0,388.0 445,395.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="368.0" y="462.0" class="tiny" text-anchor="start">return</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">ESP32 ADC range: 0-4095</text>
<text x="870" y="587" class="small" text-anchor="start">Use 3.3V, not 5V, on GPIO</text>
<text x="870" y="612" class="small" text-anchor="start">Dashboard auto-refreshes readings</text>
  <text x="48" y="694" class="small">Pins match arduino/04_sensor_dashboard.</text>
</svg>
