<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ESP32 with Servo Motor on GPIO 13</title>
  <desc id="desc">The ESP32 web server changes the servo angle by sending control pulses on GPIO 13.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">ESP32 with Servo Motor on GPIO 13</text>
<rect x="50" y="105" width="230" height="500" rx="24" fill="#d8e7f7" stroke="#167187" stroke-width="3"/>
<text x="165.0" y="143" class="h2" text-anchor="middle">ESP32 DevKit</text>
<rect x="120" y="173" width="90" height="125" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="165" y="233" class="label" text-anchor="middle">ESP32</text>
<rect x="118" y="547" width="94" height="32" rx="6" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="165" y="569" class="tiny" text-anchor="middle">USB</text>
<circle cx="275" cy="183.0" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="198" y="188.0" class="small" text-anchor="start">GPIO13</text>
<circle cx="275" cy="368.0" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="198" y="373.0" class="small" text-anchor="start">VIN/5V</text>
<circle cx="275" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="198" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="445" y="165" width="360" height="260" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="625.0" y="199" class="h2" text-anchor="middle">SG90 Servo</text>
<rect x="669" y="219" width="116" height="76" rx="10" fill="#4aa3d8" stroke="#17324d" stroke-width="3"/>
<circle cx="727" cy="257" r="24" fill="#d9e4ea" stroke="#17324d" stroke-width="3"/>
<polyline points="727,257 785,225" class="wire" stroke="#17324d" stroke-width="7"/>
<circle cx="445" cy="231.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="463" y="236.0" class="small" text-anchor="start">SIGNAL</text>
<circle cx="445" cy="313.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="463" y="318.0" class="small" text-anchor="start">5V</text>
<circle cx="445" cy="395.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="463" y="400.0" class="small" text-anchor="start">GND</text>
<polyline points="275,183.0 360.0,162.0 360.0,210.0 445,231.0" class="wire" stroke="#ef7d19" stroke-width="5"/>
<text x="368.0" y="181.0" class="tiny" text-anchor="start">angle pulse</text>
<polyline points="275,368.0 360.0,354.0 360.0,299.0 445,313.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="368.0" y="321.5" class="tiny" text-anchor="start">servo power</text>
<polyline points="275,553.0 360.0,546.0 360.0,388.0 445,395.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="368.0" y="462.0" class="tiny" text-anchor="start">return</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Use ESP32Servo library</text>
<text x="870" y="587" class="small" text-anchor="start">External 5V is better for many servos</text>
<text x="870" y="612" class="small" text-anchor="start">Share GND with ESP32</text>
  <text x="48" y="694" class="small">Pins match arduino/03_wifi_servo_control.</text>
</svg>
