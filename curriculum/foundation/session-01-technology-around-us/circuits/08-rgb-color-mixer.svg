<text x="940" y="237" class="h2" text-anchor="start">Color mixing</text>
<text x="940" y="271" class="small" text-anchor="start">R + G = yellow</text>
<text x="940" y="299" class="small" text-anchor="start">R + B = magenta</text>
<text x="940" y="327" class="small" text-anchor="start">G + B = cyan</text>
<text x="940" y="355" class="small" text-anchor="start">R + G + B = white-ish</text>
<text x="940" y="383" class="small" text-anchor="start">One resistor per color</text><text x="48" y="694" class="small">Confirm the RGB LED pin order from its datasheet; packages are not all identical.</text>
