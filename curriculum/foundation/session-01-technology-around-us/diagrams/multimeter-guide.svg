<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Digital Multimeter Connections</title>
  <desc id="desc">Resistance and continuity are measured on an unpowered component, voltage is measured in parallel, and current is measured by opening the circuit and inserting the meter in series.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .wire { fill: none; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #17324d; stroke-width: 3; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
  </style>
  <text x="48" y="48" class="title">Digital Multimeter Connections</text>
<rect x="45" y="90" width="330" height="530" rx="18" class="panel"/><text x="210" y="126" class="h2" text-anchor="middle">RESISTANCE / CONTINUITY</text><circle cx="210" cy="260" r="92" fill="#30373d" stroke="#111" stroke-width="4"/><rect x="150" y="190" width="120" height="55" rx="5" fill="#cfe7c7"/><text x="210" y="225" class="h2" text-anchor="middle">0.00</text><circle cx="210" cy="295" r="35" fill="#777" stroke="#111" stroke-width="3"/><polyline points="165,350 135,500" fill="none" stroke="#263238" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><polyline points="255,350 285,500" fill="none" stroke="#e53935" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="210" y="405" class="label" text-anchor="middle">Power OFF</text><text x="210" y="440" class="small" text-anchor="middle">Across component</text><rect x="420" y="90" width="330" height="530" rx="18" class="panel"/><text x="585" y="126" class="h2" text-anchor="middle">DC VOLTAGE</text><circle cx="585" cy="260" r="92" fill="#30373d" stroke="#111" stroke-width="4"/><rect x="525" y="190" width="120" height="55" rx="5" fill="#cfe7c7"/><text x="585" y="225" class="h2" text-anchor="middle">0.00</text><circle cx="585" cy="295" r="35" fill="#777" stroke="#111" stroke-width="3"/><polyline points="540,350 510,500" fill="none" stroke="#263238" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><polyline points="630,350 660,500" fill="none" stroke="#e53935" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="585" y="405" class="label" text-anchor="middle">Power ON</text><text x="585" y="440" class="small" text-anchor="middle">Meter in parallel</text><rect x="795" y="90" width="330" height="530" rx="18" class="panel"/><text x="960" y="126" class="h2" text-anchor="middle">DC CURRENT</text><circle cx="960" cy="260" r="92" fill="#30373d" stroke="#111" stroke-width="4"/><rect x="900" y="190" width="120" height="55" rx="5" fill="#cfe7c7"/><text x="960" y="225" class="h2" text-anchor="middle">0.00</text><circle cx="960" cy="295" r="35" fill="#777" stroke="#111" stroke-width="3"/><polyline points="915,350 885,500" fill="none" stroke="#263238" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><polyline points="1005,350 1035,500" fill="none" stroke="#e53935" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="960" y="405" class="label" text-anchor="middle">Power OFF to insert</text><text x="960" y="440" class="small" text-anchor="middle">Meter in series</text><text x="210" y="570" class="small" text-anchor="middle">COM + V/ohm socket</text><text x="585" y="570" class="small" text-anchor="middle">Probe across two nodes</text><text x="960" y="570" class="small" text-anchor="middle">Never bridge 5 V to GND</text><text x="48" y="694" class="small">Always check the selected mode and probe socket before touching the circuit.</text>
</svg>
