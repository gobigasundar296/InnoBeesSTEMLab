<text x="800" y="237" class="h2" text-anchor="start">What the colors show</text>
<text x="800" y="271" class="small" text-anchor="start">Red/blue: long power rails</text>
<text x="800" y="299" class="small" text-anchor="start">Green: one connected group</text>
<text x="800" y="327" class="small" text-anchor="start">Purple: separate group</text>
<text x="800" y="355" class="small" text-anchor="start">Center gap: no connection</text>
<text x="800" y="383" class="small" text-anchor="start">Test real boards for split rails</text><text x="48" y="694" class="small">Use continuity mode only when the breadboard is not powered.</text>
