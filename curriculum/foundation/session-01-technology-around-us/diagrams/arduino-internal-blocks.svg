<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Arduino Uno R3 Internal Functional Blocks</title>
  <desc id="desc">Functional block diagram showing USB, USB-to-serial controller, ATmega328P, memory, clock, digital input output, analog conversion, timers, power regulation, and external connectors.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .wire { fill: none; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #17324d; stroke-width: 3; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
  </style>
  <text x="48" y="48" class="title">Arduino Uno R3 Internal Functional Blocks</text>
<rect x="60" y="150" width="180" height="90" rx="16" fill="#dff1f5" stroke="#287b91" stroke-width="4"/><text x="150.0" y="187.0" class="label" text-anchor="middle">USB-B</text><text x="150.0" y="212.0" class="label" text-anchor="middle">Power + data</text><rect x="300" y="150" width="220" height="90" rx="16" fill="#dff1f5" stroke="#287b91" stroke-width="4"/><text x="410.0" y="187.0" class="label" text-anchor="middle">ATmega16U2</text><text x="410.0" y="212.0" class="label" text-anchor="middle">USB to serial</text><rect x="610" y="250" width="250" height="130" rx="16" fill="#b9e1e8" stroke="#287b91" stroke-width="4"/><text x="735.0" y="307.0" class="label" text-anchor="middle">ATmega328P</text><text x="735.0" y="332.0" class="label" text-anchor="middle">Microcontroller</text><rect x="920" y="120" width="220" height="110" rx="16" fill="#dff1f5" stroke="#287b91" stroke-width="4"/><text x="1030.0" y="167.0" class="label" text-anchor="middle">Memory</text><text x="1030.0" y="192.0" class="label" text-anchor="middle">Flash / SRAM / EEPROM</text><rect x="920" y="270" width="220" height="90" rx="16" fill="#dff1f5" stroke="#287b91" stroke-width="4"/><text x="1030.0" y="307.0" class="label" text-anchor="middle">16 MHz clock</text><rect x="300" y="470" width="220" height="100" rx="16" fill="#dff1f5" stroke="#287b91" stroke-width="4"/><text x="410.0" y="512.0" class="label" text-anchor="middle">Digital I/O</text><text x="410.0" y="537.0" class="label" text-anchor="middle">D0-D13</text><rect x="610" y="470" width="220" height="100" rx="16" fill="#dff1f5" stroke="#287b91" stroke-width="4"/><text x="720.0" y="512.0" class="label" text-anchor="middle">ADC</text><text x="720.0" y="537.0" class="label" text-anchor="middle">A0-A5</text><rect x="920" y="440" width="220" height="130" rx="16" fill="#dff1f5" stroke="#287b91" stroke-width="4"/><text x="1030.0" y="497.0" class="label" text-anchor="middle">Timers + PWM</text><text x="1030.0" y="522.0" class="label" text-anchor="middle">Timing and brightness</text><rect x="60" y="430" width="180" height="140" rx="16" fill="#dff1f5" stroke="#287b91" stroke-width="4"/><text x="150.0" y="492.0" class="label" text-anchor="middle">Power section</text><text x="150.0" y="517.0" class="label" text-anchor="middle">USB / jack / VIN</text><text x="150.0" y="542.0" class="label" text-anchor="middle">regulation</text><polyline points="240,195 300,195" fill="none" stroke="#7556d8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="520,195 610,195 610,275" fill="none" stroke="#7556d8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="240,500 300,500" fill="none" stroke="#e53935" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="735,250 735,195 920,195" fill="none" stroke="#2374d8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="860,315 920,315" fill="none" stroke="#2374d8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="660,380 410,380 410,470" fill="none" stroke="#2e9d55" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="735,380 735,470" fill="none" stroke="#2e9d55" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="810,380 1030,380 1030,440" fill="none" stroke="#ef7d19" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="48" y="694" class="small">This is a learning diagram, not the complete electrical schematic.</text>
</svg>
