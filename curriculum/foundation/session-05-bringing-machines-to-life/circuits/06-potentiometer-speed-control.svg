<circle cx="290" cy="405.0" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="213" y="410.0" class="small" text-anchor="start">D7</text>
<circle cx="290" cy="479.0" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="213" y="484.0" class="small" text-anchor="start">5V</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="405" y="120" width="300" height="330" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="555.0" y="154" class="h2" text-anchor="middle">L298N Driver</text>
