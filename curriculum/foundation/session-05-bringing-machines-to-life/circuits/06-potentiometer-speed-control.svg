<text x="915.0" y="454" class="h2" text-anchor="middle">6-9V Battery</text>
<rect x="931" y="478" width="112" height="68" rx="8" fill="#f8e5b5" stroke="#17324d" stroke-width="3"/>
<text x="987" y="517" class="label" text-anchor="middle">6-9V</text>
<circle cx="765" cy="486.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="783" y="491.0" class="small" text-anchor="start">+</text>
<circle cx="765" cy="560.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
