<circle cx="405" cy="605.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="423" y="610.0" class="small" text-anchor="start">GND</text>
<polyline points="290,257.0 347.5,236.0 347.5,165.0 405,186.0" class="wire" stroke="#ef7d19" stroke-width="5"/>
<text x="355.5" y="195.5" class="tiny" text-anchor="start">PWM speed</text>
<polyline points="290,331.0 347.5,317.0 347.5,211.0 405,225.0" class="wire" stroke="#2374d8" stroke-width="5"/>
<text x="355.5" y="259.0" class="tiny" text-anchor="start">direction 1</text>
<polyline points="290,405.0 347.5,398.0 347.5,257.0 405,264.0" class="wire" stroke="#2374d8" stroke-width="5"/>
<text x="355.5" y="322.5" class="tiny" text-anchor="start">direction 2</text>
<polyline points="290,553.0 347.5,553.0 347.5,303.0 405,303.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="355.5" y="423.0" class="tiny" text-anchor="start">common ground</text>
<polyline points="290,479.0 347.5,486.0 347.5,553.0 405,546.0" class="wire" stroke="#e53935" stroke-width="5"/>
<polyline points="290,183.0 347.5,197.0 347.5,589.5 405,575.5" class="wire" stroke="#2e9d55" stroke-width="5"/>
<text x="355.5" y="388.25" class="tiny" text-anchor="start">speed knob</text>
<polyline points="290,553.0 347.5,574.0 347.5,626.0 405,605.0" class="wire" stroke="#263238" stroke-width="5"/>
<polyline points="405,381.0 585.0,360.0 585.0,205.0 765,226.0" class="wire" stroke="#ef7d19" stroke-width="5"/>
<text x="593.0" y="277.5" class="tiny" text-anchor="start">motor wire 1</text>
<polyline points="405,420.0 585.0,406.0 585.0,336.0 765,350.0" class="wire" stroke="#ef7d19" stroke-width="5"/>
<text x="593.0" y="366.0" class="tiny" text-anchor="start">motor wire 2</text>
<polyline points="765,486.0 585.0,479.0 585.0,335.0 405,342.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="593.0" y="402.0" class="tiny" text-anchor="start">motor power</text>
<polyline points="765,560.0 585.0,560.0 585.0,303.0 405,303.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="593.0" y="426.5" class="tiny" text-anchor="start">battery GND</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">ENA on D5 controls speed</text>
<text x="870" y="587" class="small" text-anchor="start">IN1/IN2 choose direction</text>
<text x="870" y="612" class="small" text-anchor="start">Battery powers motor through driver</text>
  <text x="48" y="694" class="small">Remove ENA jumper when using PWM speed control.</text>
</svg>
