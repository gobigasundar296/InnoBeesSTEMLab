<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">L298N Pin Layout and Connections</title>
  <desc id="desc">Pin groups on an L298N module for one DC motor channel.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">L298N Pin Layout and Connections</text>
<rect x="260" y="115" width="680" height="450" rx="28" fill="#dfebef" stroke="#167187" stroke-width="3"/>
<text x="600" y="155" class="h2" text-anchor="middle">L298N Motor Driver Module</text>
<rect x="495" y="240" width="210" height="115" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="600" y="305" class="h2" text-anchor="middle">L298N</text>
<rect x="130" y="215" width="230" height="145" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="245" y="245" class="label" text-anchor="middle">Motor power</text>
<text x="150" y="280" class="small" text-anchor="start">VMS/+12V</text>
<text x="150" y="305" class="small" text-anchor="start">GND</text>
<text x="150" y="330" class="small" text-anchor="start">5V logic</text>
<polyline points="360,287 260,287" class="wire" stroke="#e53935" stroke-width="5"/>
<rect x="130" y="425" width="230" height="145" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="245" y="455" class="label" text-anchor="middle">Arduino control A</text>
<text x="150" y="490" class="small" text-anchor="start">ENA -&gt; D5 PWM</text>
<text x="150" y="515" class="small" text-anchor="start">IN1 -&gt; D6</text>
<text x="150" y="540" class="small" text-anchor="start">IN2 -&gt; D7</text>
<polyline points="360,497 260,497" class="wire" stroke="#2374d8" stroke-width="5"/>
<rect x="880" y="215" width="230" height="145" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="995" y="245" class="label" text-anchor="middle">Motor A output</text>
<text x="900" y="280" class="small" text-anchor="start">OUT1 -&gt; motor</text>
<text x="900" y="305" class="small" text-anchor="start">OUT2 -&gt; motor</text>
<polyline points="880,287 940,287" class="wire" stroke="#ef7d19" stroke-width="5"/>
<rect x="880" y="425" width="230" height="145" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="995" y="455" class="label" text-anchor="middle">Motor B optional</text>
<text x="900" y="490" class="small" text-anchor="start">ENB</text>
<text x="900" y="515" class="small" text-anchor="start">IN3/IN4</text>
<text x="900" y="540" class="small" text-anchor="start">OUT3/OUT4</text>
<polyline points="880,497 940,497" class="wire" stroke="#7556d8" stroke-width="5"/>
<rect x="380" y="585" width="440" height="88" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="398" y="615" class="h2" text-anchor="start">Important</text>
<text x="400" y="647" class="small" text-anchor="start">Remove ENA jumper for PWM speed</text>
<text x="400" y="672" class="small" text-anchor="start">Battery GND and Arduino GND must join</text>
<text x="400" y="697" class="small" text-anchor="start">Driver may get warm during normal use</text>
  <text x="48" y="694" class="small">Pin labels vary slightly between L298N boards; check your module silkscreen.</text>
</svg>
