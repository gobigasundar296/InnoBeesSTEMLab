<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">SG90 Servo Wiring to Arduino</title>
  <desc id="desc">The servo signal wire connects to D9 while red and brown wires connect to 5V and GND.</desc>
  <rect width="1200" height="720" fill="#f7fbfd"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17324d"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
    .h2 { font: 700 21px Arial, sans-serif; fill: #17324d; }
    .label { font: 600 17px Arial, sans-serif; fill: #17324d; }
    .small { font: 15px Arial, sans-serif; fill: #526d82; }
    .tiny { font: 12px Arial, sans-serif; fill: #526d82; }
    .mono { font: 600 14px Consolas, monospace; fill: #17324d; }
    .panel { fill: #ffffff; stroke: #a8c0cc; stroke-width: 3; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <text x="48" y="48" class="title">SG90 Servo Wiring to Arduino</text>
<rect x="50" y="105" width="245" height="500" rx="24" fill="#cce9f0" stroke="#167187" stroke-width="3"/>
<text x="172.5" y="143" class="h2" text-anchor="middle">Arduino Uno</text>
<rect x="78" y="177" width="78" height="120" rx="12" fill="#255f70" stroke="#17324d" stroke-width="3"/>
<text x="117" y="229" class="tiny" text-anchor="middle">ATmega</text>
<text x="117" y="249" class="tiny" text-anchor="middle">328P</text>
<rect x="83" y="517" width="95" height="52" rx="8" fill="#bccbd3" stroke="#17324d" stroke-width="3"/>
<text x="130" y="549" class="tiny" text-anchor="middle">USB-B</text>
<circle cx="290" cy="183.0" r="8" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="213" y="188.0" class="small" text-anchor="start">D9</text>
<circle cx="290" cy="368.0" r="8" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="213" y="373.0" class="small" text-anchor="start">5V</text>
<circle cx="290" cy="553.0" r="8" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="213" y="558.0" class="small" text-anchor="start">GND</text>
<rect x="440" y="170" width="360" height="260" rx="18" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="620.0" y="204" class="h2" text-anchor="middle">SG90 Servo</text>
<rect x="664" y="224" width="116" height="76" rx="10" fill="#4aa3d8" stroke="#17324d" stroke-width="3"/>
<circle cx="722" cy="262" r="24" fill="#d9e4ea" stroke="#17324d" stroke-width="3"/>
<polyline points="722,262 780,230" class="wire" stroke="#17324d" stroke-width="7"/>
<circle cx="440" cy="236.0" r="7" fill="#fff" stroke="#17324d" stroke-width="2"/>
<text x="458" y="241.0" class="small" text-anchor="start">SIGNAL</text>
<circle cx="440" cy="318.0" r="7" fill="#f8c5c5" stroke="#17324d" stroke-width="2"/>
<text x="458" y="323.0" class="small" text-anchor="start">5V</text>
<circle cx="440" cy="400.0" r="7" fill="#263238" stroke="#17324d" stroke-width="2"/>
<text x="458" y="405.0" class="small" text-anchor="start">GND</text>
<polyline points="290,183.0 365.0,162.0 365.0,215.0 440,236.0" class="wire" stroke="#ef7d19" stroke-width="5"/>
<text x="373.0" y="183.5" class="tiny" text-anchor="start">angle signal</text>
<polyline points="290,368.0 365.0,354.0 365.0,304.0 440,318.0" class="wire" stroke="#e53935" stroke-width="5"/>
<text x="373.0" y="324.0" class="tiny" text-anchor="start">red wire</text>
<polyline points="290,553.0 365.0,546.0 365.0,393.0 440,400.0" class="wire" stroke="#263238" stroke-width="5"/>
<text x="373.0" y="464.5" class="tiny" text-anchor="start">brown wire</text>
<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Sweep code moves 0, 45, 90, 180 deg</text>
<text x="870" y="587" class="small" text-anchor="start">Use external 5V for heavy loads</text>
<text x="870" y="612" class="small" text-anchor="start">Share GND with Arduino</text>
  <text x="48" y="694" class="small">Pins match arduino/01_servo_sweep.</text>
</svg>
