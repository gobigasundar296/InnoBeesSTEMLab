<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Smart Fan Controller Complete System</title>
  <desc id="desc">An LDR reading changes fan speed through the L298N PWM enable pin.</desc>
