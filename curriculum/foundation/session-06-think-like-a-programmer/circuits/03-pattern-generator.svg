<rect x="850" y="500" width="300" height="114" rx="16" fill="#ffffff" stroke="#a8c0cc" stroke-width="3"/>
<text x="868" y="530" class="h2" text-anchor="start">Key notes</text>
<text x="870" y="562" class="small" text-anchor="start">Patterns: chase, bounce, build-up, binary</text>
<text x="870" y="587" class="small" text-anchor="start">Use arrays to store pins</text>
<text x="870" y="612" class="small" text-anchor="start">Use for loops to repeat actions</text>
  <text x="48" y="694" class="small">Pins match arduino/03_pattern_generator.</text>
</svg>
