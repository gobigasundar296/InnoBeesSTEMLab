<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Reaction Time Game Circuit</title>
  <desc id="desc">A random delay turns on the LED, then the player presses the button as fast as possible.</desc>
